[global]
# Persistent state (failure counters, reboot history)
state_file = "/var/lib/raspi-sentinel/state.json"
# Guard state.json growth (bytes). 0 = disable guard.
state_max_file_bytes = 2000000
# Keep only the latest N reboot entries when persisting state.
state_reboots_max_entries = 256
# Exclusive state lock wait timeout (seconds) to avoid concurrent lost updates.
state_lock_timeout_sec = 5
# Lightweight transition event log
events_file = "/var/lib/raspi-sentinel/events.jsonl"
# Rotate events.jsonl when file size exceeds this (bytes). 0 = disable rotation.
events_max_file_bytes = 5000000
# Number of rotated generations to retain: events.jsonl.1 .. .N
events_backup_generations = 3
# raspi-sentinel's own health snapshot
monitor_stats_file = "/var/lib/raspi-sentinel/stats.json"
monitor_stats_interval_sec = 30

# Staged recovery thresholds
restart_threshold = 2
reboot_threshold = 5

# Guards against recovery storms / reboot loops
restart_cooldown_sec = 120
reboot_cooldown_sec = 1800
reboot_window_sec = 21600
max_reboots_in_window = 2
min_uptime_for_reboot_sec = 600

# Misc
default_command_timeout_sec = 10
loop_interval_sec = 30
# Command execution defaults to shell=false.
# Use *_use_shell=true only for commands that require shell syntax.

# Optional tmpfs tiering for SD-wear optimization.
# Uncomment this section when /run/raspi-sentinel is mounted as tmpfs.
#
#[storage]
## High-frequency snapshots and volatile runtime state (tmpfs)
#snapshot_path = "/run/raspi-sentinel/stats.json"
#state_volatile_path = "/run/raspi-sentinel/state.volatile.json"
## Durable state slice (disk)
#state_durable_path = "/var/lib/raspi-sentinel/state.durable.json"
#events_path = "/var/lib/raspi-sentinel/events.jsonl"
## Supported values: reboot_history, followup_schedule, notify_backlog
#state_durable_fields = ["reboot_history", "followup_schedule", "notify_backlog"]
## Startup verification options used by `verify-storage`
#require_tmpfs = true
#verify_min_free_bytes = 1048576
#verify_write_bytes = 4096
#verify_cooldown_sec = 2

[notify.discord]
enabled = true
webhook_url = "https://discord.com/api/webhooks/1493229716264456334/64lbSGktFQevSccqKT7xBzWKtk5IINn2RxQ0wA86PpFPh6TFTyIw6dI-_Za2Su9o-gh9"
username = "raspi-sentinel-v2"
timeout_sec = 5
followup_delay_sec = 300
retry_interval_sec = 60
heartbeat_interval_sec = 0
notify_on_recovery = false
# Set heartbeat_interval_sec = 0 to disable periodic healthy heartbeat notifications.
# Set notify_on_recovery = false to suppress "Recovered" messages.

# readsb target
[[targets]]
name = "readsb"
services = ["readsb"]
service_active = true
output_file = "/run/readsb/stats.json"
output_max_age_sec = 180
command = "test -s /run/readsb/stats.json"
command_timeout_sec = 5
# Semantic health snapshot (produced by the monitored service itself)
stats_file = "/run/readsb/stats.json"
stats_updated_max_age_sec = 180
stats_last_success_max_age_sec = 180
stats_records_stall_cycles = 3
restart_threshold = 2
reboot_threshold = 5

# fr24feed target
[[targets]]
name = "fr24feed"
services = ["fr24feed"]
service_active = true
command = "systemctl is-active --quiet fr24feed"
command_timeout_sec = 5
restart_threshold = 2
reboot_threshold = 6

# airspy_adsb target
[[targets]]
name = "airspy_adsb"
services = ["airspy_adsb"]
service_active = true
output_file = "/run/airspy_adsb/stats.json"
output_max_age_sec = 180
command = "test -s /run/airspy_adsb/stats.json"
command_timeout_sec = 5
stats_file = "/run/airspy_adsb/stats.json"
stats_updated_max_age_sec = 180
stats_last_input_max_age_sec = 180
stats_last_success_max_age_sec = 180
stats_records_stall_cycles = 3
# Skip checks while gain guard is actively restarting the decoder,
# and keep a short grace period for stats.json to be recreated.
maintenance_mode_command = "systemctl is-active --quiet airspy_gain_guard.service"
maintenance_mode_timeout_sec = 3
maintenance_grace_sec = 90
restart_threshold = 2
reboot_threshold = 5

# external status JSON watcher (generic contract)
# monitored top-level keys:
# - updated_at
# - internal_state
# - last_progress_ts
# - last_success_ts
[[targets]]
name = "external_service_status"
services = ["example.service"]
service_active = true
external_status_file = "/run/example/service-status.json"
external_status_updated_max_age_sec = 180
external_status_last_progress_max_age_sec = 600
external_status_last_success_max_age_sec = 1800
external_status_startup_grace_sec = 120
# keep shallow: do not embed app-specific reason/components into policy
external_status_unhealthy_values = ["failed", "unhealthy"]
restart_threshold = 2
reboot_threshold = 5

# network_uplink target (detect DNS / outbound connectivity degradation)
[[targets]]
name = "network_uplink"
services = []
service_active = false
network_probe_enabled = true
network_interface = "wlan0"
gateway_probe_timeout_sec = 2
internet_ip_targets = ["1.1.1.1", "8.8.8.8"]
dns_query_target = "blender.prod.fr24.io"
http_probe_target = "https://www.google.com/generate_204"
dependency_check_timeout_sec = 8
# Optional: detect clock anomaly (no automatic clock correction).
# This compares wall clock progression vs monotonic progression,
# and optionally compares against HTTP Date header as external reference.
time_health_enabled = true
check_interval_threshold_sec = 30
wall_clock_freeze_min_monotonic_sec = 25
wall_clock_freeze_max_wall_advance_sec = 1
wall_clock_drift_threshold_sec = 30
http_time_probe_url = "https://www.google.com"
http_time_probe_timeout_sec = 5
clock_skew_threshold_sec = 300
clock_anomaly_reboot_consecutive = 3
# DNS-only failures are classified and reboot is suppressed.
# Gateway failures can still escalate by threshold/cooldown guards.
restart_threshold = 5
reboot_threshold = 10

[targets.consecutive_failure_thresholds]
degraded = 2
failed = 6

[targets.latency_thresholds_ms]
gateway = 100
internet_ip = 350
dns = 500
http_total = 1200

[targets.packet_loss_thresholds_pct]
gateway = 20
internet_ip = 30

# Optional command-based checks can be combined with built-in probe if needed.
# dns_check_command = "getent ahostsv4 blender.prod.fr24.io >/dev/null"
# dns_check_use_shell = true
