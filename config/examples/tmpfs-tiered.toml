[global]
state_file = "/run/raspi-sentinel/state.volatile.json"
state_durable_file = "/var/lib/raspi-sentinel/state.durable.json"
state_durable_fields = ["reboot_history", "followup_schedule", "notify_backlog"]
events_file = "/var/lib/raspi-sentinel/events.jsonl"
monitor_stats_file = "/run/raspi-sentinel/stats.json"
restart_threshold = 2
reboot_threshold = 5
restart_cooldown_sec = 120
reboot_cooldown_sec = 1800
reboot_window_sec = 21600
max_reboots_in_window = 2
min_uptime_for_reboot_sec = 600
default_command_timeout_sec = 10
restart_service_timeout_sec = 30
loop_interval_sec = 30
storage_require_tmpfs = true
storage_verify_min_free_bytes = 1048576
storage_verify_write_bytes = 4096
storage_verify_cooldown_sec = 2

[notify.discord]
enabled = false
username = "raspi-sentinel"
timeout_sec = 5
followup_delay_sec = 300
retry_interval_sec = 60
retry_backoff_base_sec = 0.5
heartbeat_interval_sec = 0
notify_on_recovery = false

[[targets]]
name = "app"
services = ["app.service"]
service_active = true
command = "systemctl is-active --quiet app.service"
command_timeout_sec = 5
restart_threshold = 2
reboot_threshold = 5
