[global]
state_file = "/var/lib/raspi-sentinel/state.json"
events_file = "/var/lib/raspi-sentinel/events.jsonl"
monitor_stats_file = "/var/lib/raspi-sentinel/stats.json"
restart_threshold = 2
reboot_threshold = 5
restart_cooldown_sec = 120
reboot_cooldown_sec = 1800
reboot_window_sec = 21600
max_reboots_in_window = 2
min_uptime_for_reboot_sec = 600
default_command_timeout_sec = 10
loop_interval_sec = 30

[notify.discord]
enabled = true
webhook_url = "https://discord.com/api/webhooks/..."
username = "raspi-sentinel"
timeout_sec = 5
followup_delay_sec = 300
retry_interval_sec = 60
heartbeat_interval_sec = 0
notify_on_recovery = false

[[targets]]
name = "app"
services = ["app.service"]
service_active = true
command = "systemctl is-active --quiet app.service"
command_timeout_sec = 5
stats_file = "/run/app/stats.json"
stats_updated_max_age_sec = 180
stats_last_success_max_age_sec = 180
stats_records_stall_cycles = 3
restart_threshold = 2
reboot_threshold = 5
