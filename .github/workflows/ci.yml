name: CI

on:
  push:
  pull_request:

jobs:
  prepush_guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run pre-push guard
        run: |
          bash scripts/prepush_check.sh

  lint:
    runs-on: ubuntu-latest
    needs: prepush_guard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff>=0.8"
      - name: Ruff check and format
        run: |
          ruff check src tests
          ruff format --check src tests

  typecheck:
    runs-on: ubuntu-latest
    needs: [prepush_guard, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: mypy strict
        run: |
          mypy

  test:
    runs-on: ubuntu-latest
    needs: [prepush_guard, lint, typecheck]
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Tests and coverage (tracked modules)
        run: |
          pytest \
            --cov=raspi_sentinel.checks \
            --cov=raspi_sentinel.cli \
            --cov=raspi_sentinel.config \
            --cov=raspi_sentinel.config_summary \
            --cov=raspi_sentinel.engine \
            --cov=raspi_sentinel.cycle_notifications \
            --cov=raspi_sentinel.notify \
            --cov=raspi_sentinel.state_models \
            --cov=raspi_sentinel.recovery \
            --cov=raspi_sentinel.policy \
            --cov=raspi_sentinel.status_events \
            --cov=raspi_sentinel.time_health \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80
      - name: Policy + status_events gate
        run: |
          python -m coverage report \
            --include="*/raspi_sentinel/policy.py,*/raspi_sentinel/status_events.py" \
            --fail-under=85
      - name: Core checks + recovery gate
        run: |
          python -m coverage report \
            --include="*/raspi_sentinel/checks/*.py,*/raspi_sentinel/recovery.py" \
            --fail-under=88
      - name: Notification pipeline gate
        run: |
          python -m coverage report \
            --include="*/raspi_sentinel/engine.py,*/raspi_sentinel/cycle_notifications.py,*/raspi_sentinel/notify.py,*/raspi_sentinel/state_models.py" \
            --fail-under=90

  package:
    runs-on: ubuntu-latest
    needs: [prepush_guard, lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build --sdist --wheel
      - name: Install wheel and smoke test CLI
        run: |
          python -m pip install dist/*.whl
          raspi-sentinel --help
