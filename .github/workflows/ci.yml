name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff>=0.8"
      - name: Ruff check and format
        run: |
          ruff check src tests
          ruff format --check src tests

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Tests and coverage (tracked modules)
        run: |
          pytest \
            --cov=raspi_sentinel.checks \
            --cov=raspi_sentinel.cli \
            --cov=raspi_sentinel.config \
            --cov=raspi_sentinel.config_summary \
            --cov=raspi_sentinel.recovery \
            --cov=raspi_sentinel.policy \
            --cov=raspi_sentinel.status_events \
            --cov=raspi_sentinel.time_health \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80
      - name: Policy + status_events gate
        run: |
          python -m coverage report \
            --include="src/raspi_sentinel/policy.py,src/raspi_sentinel/status_events.py" \
            --fail-under=85
      - name: Core checks + recovery gate
        run: |
          python -m coverage report \
            --include="src/raspi_sentinel/checks.py,src/raspi_sentinel/recovery.py" \
            --fail-under=88
