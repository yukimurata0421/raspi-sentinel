name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff check
        run: |
          ruff check .
      - name: Ruff format check
        run: |
          ruff format --check .
      - name: Run tests with branch coverage
        run: |
          pytest \
            --cov=raspi_sentinel.checks \
            --cov=raspi_sentinel.config \
            --cov=raspi_sentinel.recovery \
            --cov=raspi_sentinel.time_health \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=json \
            --cov-fail-under=80
      - name: Enforce core policy coverage (checks + recovery)
        run: |
          python -m coverage report \
            --include="src/raspi_sentinel/checks.py,src/raspi_sentinel/recovery.py" \
            --fail-under=90
