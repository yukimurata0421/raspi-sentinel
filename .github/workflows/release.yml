name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write

jobs:
  verify-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Require successful CI on tagged commit
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.sha;
            const timeoutMs = 45 * 60 * 1000;
            const pollIntervalMs = 15 * 1000;
            const deadline = Date.now() + timeoutMs;

            while (Date.now() < deadline) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "ci.yml",
                head_sha: headSha,
                per_page: 50,
              });

              const ciRuns = data.workflow_runs
                .filter((run) => run.name === "CI")
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

              const successfulRun = ciRuns.find(
                (run) => run.status === "completed" && run.conclusion === "success",
              );
              if (successfulRun) {
                core.info(
                  `Using successful CI run #${successfulRun.run_number} (${successfulRun.html_url}) for commit ${headSha}.`,
                );
                return;
              }

              const pendingRun = ciRuns.find(
                (run) => run.status === "queued" || run.status === "in_progress",
              );
              if (pendingRun) {
                core.info(
                  `Waiting for CI run #${pendingRun.run_number} (${pendingRun.status}) on commit ${headSha}...`,
                );
                await new Promise((resolve) => setTimeout(resolve, pollIntervalMs));
                continue;
              }

              const completedRun = ciRuns.find((run) => run.status === "completed");
              if (completedRun) {
                core.setFailed(
                  `CI did not succeed for commit ${headSha}. Most recent completed run #${completedRun.run_number} concluded with '${completedRun.conclusion}'.`,
                );
                return;
              }

              core.info(`No CI workflow run found yet for commit ${headSha}; retrying...`);
              await new Promise((resolve) => setTimeout(resolve, pollIntervalMs));
            }

            core.setFailed(
              `Timed out waiting for successful CI on commit ${headSha} after ${timeoutMs / 1000}s.`,
            );

  release:
    runs-on: ubuntu-latest
    needs: verify-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build --sdist --wheel
      - name: Install wheel and smoke test CLI
        run: |
          python -m pip install dist/*.whl
          raspi-sentinel --help
      - name: Validate release notes file
        run: |
          NOTES_FILE="docs/release-notes/${GITHUB_REF_NAME}.md"
          if [ ! -f "${NOTES_FILE}" ]; then
            echo "Missing release notes file: ${NOTES_FILE}"
            exit 1
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          # Curated notes; add docs/release-notes/vX.Y.Z.md before tagging (see docs/VERSIONING.md).
          body_path: docs/release-notes/${{ github.ref_name }}.md
          files: |
            dist/*.whl
            dist/*.tar.gz
