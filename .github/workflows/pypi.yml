name: Publish PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      repository:
        description: "Target package index"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read
  id-token: write

jobs:
  publish-testpypi:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Show expected Trusted Publisher claims (TestPyPI)
        run: |
          echo "repository=${GITHUB_REPOSITORY}"
          echo "workflow_ref=${GITHUB_WORKFLOW_REF}"
          echo "ref=${GITHUB_REF}"
          echo "environment=testpypi"
      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build --sdist --wheel
          twine check dist/*
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Show expected Trusted Publisher claims (PyPI)
        run: |
          echo "repository=${GITHUB_REPOSITORY}"
          echo "workflow_ref=${GITHUB_WORKFLOW_REF}"
          echo "ref=${GITHUB_REF}"
          echo "environment=pypi"
      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build --sdist --wheel
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
